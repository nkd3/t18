[core]
root = C:\T18
log_dir = C:\T18\logs
lock_file = C:\T18\.locks\notion_git_watcher.lock
poll_seconds = 5
git_interval_seconds = 120
notion_full_index_minutes = 15
status_deleted_value = Deleted

[ignore]
patterns = \.git, \.venv, __pycache__, \logs\, \.locks\, node_modules, .DS_Store, Thumbs.db

[notion]
database_id = 275e38d133c781498421d9b4321e56c8
integration_token = <PLACEHOLDER_NTN_TOKEN_EXAMPLE_ntn_xxx>
prop_path = Path
prop_size = Size
prop_modified = Modified
prop_status = Status
force_ipv4 = true

[github]
repo_dir = C:\T18
remote_name = origin
branch = main
auth = gcm
pat = <PLACEHOLDER_ONLY_IF_auth=pat>
commit_message = chore(watcher): autosync from watcher
pull_rebase = true
